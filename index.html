<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Spicy Restaurant — Fresh Food Delivery</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/whn3T8DW/Screenshot-2026-0707-214217.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/whn3T8DW/Screenshot-2026-0707-214217.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#130704; --paper:#fff7ec; --card:#1d0b06; --text:#fff7ec; --muted:#f5c7a3;
  --red:#d73322; --red-dark:#a51f14; --orange:#ff9d2e; --yellow:#ffd166; --green:#2d7d46;
  --line:rgba(255,255,255,.16); --shadow:0 16px 40px rgba(0,0,0,.35); --radius:18px;
  --head:'Playfair Display', Georgia, serif; --body:'Poppins', sans-serif;
}
*{box-sizing:border-box} html,body{margin:0;padding:0;scroll-behavior:smooth}
body{font-family:var(--body);color:var(--text);background:radial-gradient(circle at 10% 0%,rgba(255,157,46,.18),transparent 36%),radial-gradient(circle at 90% 10%,rgba(215,51,34,.22),transparent 32%),var(--bg)}
a{text-decoration:none;color:inherit} img{max-width:100%;display:block} button,input,textarea{font-family:var(--body)} button{cursor:pointer}
.container{max-width:1180px;margin:auto;padding:0 22px}
.navbar{position:sticky;top:0;z-index:50;background:rgba(19,7,4,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:12px 22px;max-width:1180px;margin:auto}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer}.logo{width:58px;height:58px;border-radius:50%;border:2px solid var(--orange);object-fit:cover;background:#fff;box-shadow:0 0 22px rgba(255,157,46,.35)}
.brand-title{font-family:var(--head);font-size:1.45rem;font-weight:800;line-height:1}.brand-tag{font-size:.72rem;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-top:4px}
.nav-links{display:flex;align-items:center;gap:18px}.nav-link{font-size:.9rem;font-weight:700;color:#ffe7d4}.nav-link:hover{color:var(--orange)}
.cart-pill{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--red),var(--orange));padding:10px 16px;border-radius:999px;font-weight:800;color:#fff;box-shadow:0 10px 24px rgba(215,51,34,.35)}
.cart-count{min-width:22px;height:22px;border-radius:50%;background:#fff;color:var(--red);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900}
.hero{min-height:560px;display:flex;align-items:center;position:relative;overflow:hidden;border-bottom:1px solid var(--line)}
.hero::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(19,7,4,.96) 0%,rgba(19,7,4,.72) 45%,rgba(19,7,4,.25) 100%),url("https://images.unsplash.com/photo-1596797038530-2c107229654b?q=80&w=1600&auto=format&fit=crop");background-size:cover;background-position:center;transform:scale(1.02)}
.hero-content{position:relative;max-width:650px;padding:90px 0}.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.45);color:var(--yellow);padding:8px 14px;border-radius:999px;font-size:.8rem;font-weight:800;margin-bottom:18px}
.hero h1{font-family:var(--head);font-size:clamp(2.5rem,6vw,5rem);line-height:.98;margin:0 0 18px}.hero p{font-size:1.05rem;color:#ffd8bd;max-width:560px;margin:0 0 28px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:none;border-radius:999px;padding:13px 24px;font-weight:800;font-size:.95rem;color:#fff;background:linear-gradient(135deg,var(--red),var(--orange));box-shadow:0 14px 28px rgba(215,51,34,.32);transition:.2s}.btn:hover{transform:translateY(-2px);filter:brightness(1.05)}.btn.secondary{background:transparent;border:1.5px solid rgba(255,255,255,.35);box-shadow:none}.btn.full{width:100%}.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}.section{padding:58px 0}.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}.section-head h2{font-family:var(--head);font-size:2.3rem;margin:0}.section-head p{margin:6px 0 0;color:var(--muted)}
.stamp{border:1px dashed var(--orange);color:var(--orange);padding:8px 13px;border-radius:8px;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:26px}.chip{border:1px solid rgba(255,255,255,.18);color:#ffd8bd;background:rgba(255,255,255,.06);padding:9px 16px;border-radius:999px;font-weight:800;font-size:.85rem}.chip.active,.chip:hover{background:var(--orange);color:#1a0803;border-color:var(--orange)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:22px}.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}.card-img{height:190px;overflow:hidden;background:#2b1008;position:relative}.card-img img{width:100%;height:100%;object-fit:cover;transition:.35s}.card:hover .card-img img{transform:scale(1.07)}
.cat-label{position:absolute;top:12px;left:12px;background:rgba(19,7,4,.82);border:1px solid rgba(255,255,255,.18);padding:5px 10px;border-radius:999px;color:var(--yellow);font-size:.7rem;font-weight:800}.card-body{padding:18px;display:flex;flex-direction:column;gap:9px;flex:1}.card h3{font-family:var(--head);font-size:1.28rem;margin:0}.desc{font-size:.86rem;color:#f6c8a7;flex:1;margin:0}.card-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px}.price{font-family:var(--head);font-size:1.35rem;font-weight:800;color:var(--yellow)}.add-btn{border:none;background:var(--red);color:#fff;border-radius:999px;padding:9px 14px;font-weight:900;font-size:.8rem}.add-btn:hover{background:var(--red-dark)}.add-btn.in-cart{background:var(--green)}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}.feature{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:var(--radius);padding:22px}.feature .ico{font-size:2rem;margin-bottom:8px}.feature h3{margin:0 0 6px;font-family:var(--head)}.feature p{margin:0;color:var(--muted);font-size:.9rem}
.page-title{font-family:var(--head);font-size:2.4rem;margin:0 0 24px}.cart-layout,.checkout-layout{display:grid;grid-template-columns:1.55fr .95fr;gap:28px;align-items:start}
.cart-item{display:grid;grid-template-columns:88px 1fr auto auto;gap:14px;align-items:center;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px}.cart-item img{width:88px;height:88px;object-fit:cover;border-radius:14px}.item-name{font-family:var(--head);font-size:1.1rem;font-weight:800}.item-small{font-size:.82rem;color:var(--muted)}.remove{color:#ff8f75;font-weight:800;font-size:.8rem;margin-top:6px;display:inline-block}.qty{display:flex;align-items:center;border:1px solid var(--line);border-radius:999px;overflow:hidden}.qty button{width:34px;height:34px;border:none;background:rgba(255,255,255,.08);color:#fff;font-weight:900}.qty input{width:44px;height:34px;border:none;text-align:center;background:rgba(255,255,255,.04);color:#fff;font-weight:800}.total-line{font-family:var(--head);font-size:1.12rem;font-weight:800;color:var(--yellow)}
.summary,.form-card{background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.2);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}.summary h3,.form-card h3{font-family:var(--head);margin:0 0 16px;font-size:1.45rem}.summary-row{display:flex;justify-content:space-between;gap:14px;border-bottom:1px dashed rgba(255,255,255,.18);padding:10px 0;color:#ffd8bd;font-size:.92rem}.summary-row.grand{border-bottom:none;font-weight:900;color:#fff;font-size:1.15rem}.summary-row.grand span:last-child{color:var(--yellow);font-family:var(--head)}
.field{margin-bottom:16px}.field label{display:block;margin-bottom:7px;font-weight:800;font-size:.86rem}.field input,.field textarea{width:100%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;border-radius:13px;padding:12px 14px;font-size:.95rem;outline:none}.field input:focus,.field textarea:focus{border-color:var(--orange)}.field textarea{min-height:92px;resize:vertical}.empty{text-align:center;padding:80px 20px;color:var(--muted)}.success{text-align:center;padding:80px 20px}.success .mark{display:inline-block;border:4px solid var(--green);color:#87ffaf;padding:16px 26px;border-radius:18px;font-family:var(--head);font-size:1.7rem;transform:rotate(-3deg);margin-bottom:20px}
footer{border-top:1px solid var(--line);padding:30px 0;background:#0d0402;color:#ffd8bd;margin-top:30px}.footer-inner{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:.88rem}
@media(max-width:850px){.cart-layout,.checkout-layout{grid-template-columns:1fr}.nav-link.hide-sm{display:none}}@media(max-width:560px){.brand-title{font-size:1.08rem}.logo{width:48px;height:48px}.hero{min-height:520px}.cart-item{grid-template-columns:72px 1fr}.cart-item img{width:72px;height:72px}.qty,.total-line{grid-column:2}.nav-inner{padding:10px 14px}.container{padding:0 16px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CONFIG = {
  STORE_NAME: "The Spicy Restaurant",
  TAGLINE: "",
  CURRENCY: "₹",
  LOGO: "https://i.ibb.co/whn3T8DW/Screenshot-2026-0707-214217.png",
  FORMSPREE_URL: "https://formspree.io/f/mqevndnk",
  RECEIVER_EMAIL: "masterbabu3355@gmail.com"
};
const PRODUCTS = [
  {id:"f1",name:"Chicken Biryani",price:149,category:"Biryani",description:"Spicy dum-style chicken biryani with aromatic rice, masala and raita.",image:"https://images.unsplash.com/photo-1563379091339-03246963d96c?q=80&w=900&auto=format&fit=crop",stock:30},
  {id:"f2",name:"Mutton Biryani",price:219,category:"Biryani",description:"Rich mutton biryani cooked with bold spices and long-grain rice.",image:"https://images.unsplash.com/photo-1631515242808-497c3fbd3972?q=80&w=900&auto=format&fit=crop",stock:25},
  {id:"f3",name:"Crispy Veg Burger",price:79,category:"Burger",description:"Crispy patty burger with fresh veggies, cheese and spicy sauce.",image:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=900&auto=format&fit=crop",stock:40},
  {id:"f4",name:"Chicken Burger",price:119,category:"Burger",description:"Juicy chicken burger loaded with mayo, lettuce and smoky spicy sauce.",image:"https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=900&auto=format&fit=crop",stock:35},
  {id:"f5",name:"Veg Chaumin",price:89,category:"Chinese",description:"Street-style veg chaumin tossed with crunchy vegetables and sauces.",image:"https://images.unsplash.com/photo-1585032226651-759b368d7246?q=80&w=900&auto=format&fit=crop",stock:35},
  {id:"f6",name:"Chicken Chaumin",price:129,category:"Chinese",description:"Hot chicken chaumin with noodles, chicken pieces and spicy seasoning.",image:"https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?q=80&w=900&auto=format&fit=crop",stock:30},
  {id:"f7",name:"Steamed Momo",price:69,category:"Momo",description:"Soft steamed momos served with fiery red chutney and mayo.",image:"https://images.unsplash.com/photo-1625220194771-7ebdea0b70b9?q=80&w=900&auto=format&fit=crop",stock:50},
  {id:"f8",name:"Fried Momo",price:89,category:"Momo",description:"Crispy fried momos with spicy restaurant-special chutney.",image:"https://images.unsplash.com/photo-1496116218417-1a781b1c416c?q=80&w=900&auto=format&fit=crop",stock:45},
  {id:"f9",name:"Chicken Thali",price:179,category:"Thali",description:"Chicken curry, rice, roti, salad and special chutney in one plate.",image:"https://images.unsplash.com/photo-1585937421612-70a008356fbe?q=80&w=900&auto=format&fit=crop",stock:25},
  {id:"f10",name:"Mutton Thali",price:249,category:"Thali",description:"Mutton curry thali with rice, roti, salad and spicy gravy.",image:"https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?q=80&w=900&auto=format&fit=crop",stock:20},
  {id:"f11",name:"Roasted Chicken",price:299,category:"Chicken",description:"Restaurant-style roasted chicken with smoky masala and onion salad.",image:"https://images.unsplash.com/photo-1598103442097-8b74394b95c6?q=80&w=900&auto=format&fit=crop",stock:18},
  {id:"f12",name:"Chicken Lollipop",price:159,category:"Chicken",description:"Crispy chicken lollipop coated with hot and tangy sauce.",image:"https://images.unsplash.com/photo-1625938144755-652e08e359b7?q=80&w=900&auto=format&fit=crop",stock:28}
];
const CART_KEY = "spicy_restaurant_cart";
function getCart(){try{return JSON.parse(localStorage.getItem(CART_KEY))||[]}catch(e){return[]}}
function saveCart(cart){localStorage.setItem(CART_KEY,JSON.stringify(cart));updateCartBadge()}
function cartCount(){return getCart().reduce((sum,item)=>sum+item.qty,0)}
function addToCart(id,qty=1){const cart=getCart();const item=cart.find(i=>i.id===id);const product=PRODUCTS.find(p=>p.id===id);const max=product?product.stock:99;if(item)item.qty=Math.min(item.qty+qty,max);else cart.push({id,qty:Math.min(qty,max)});saveCart(cart)}
function setQty(id,qty){const cart=getCart();const item=cart.find(i=>i.id===id);const product=PRODUCTS.find(p=>p.id===id);const max=product?product.stock:99;qty=Math.max(1,Math.min(parseInt(qty||1),max));if(item){item.qty=qty;saveCart(cart)}return qty}
function removeFromCart(id){saveCart(getCart().filter(i=>i.id!==id))}
function clearCart(){saveCart([])}
function fmt(n){return CONFIG.CURRENCY+Number(n).toLocaleString("en-IN")}
function updateCartBadge(){const el=document.getElementById("cart-count");if(el)el.textContent=cartCount()}
function route(){const hash=window.location.hash.slice(1)||"/";if(hash.startsWith("/cart"))return"cart";if(hash.startsWith("/checkout"))return"checkout";return"home"}
function navigate(path){window.location.hash=path}
window.addEventListener("DOMContentLoaded",render);window.addEventListener("hashchange",render);
let activeCategory="All";
function shell(){return `<header class="navbar"><div class="nav-inner"><div class="brand" onclick="navigate('/')"><img class="logo" src="${CONFIG.LOGO}" alt="${CONFIG.STORE_NAME} logo"><div><div class="brand-title">${CONFIG.STORE_NAME}</div></div></div><nav class="nav-links"><a class="nav-link hide-sm" href="#/">Menu</a><a class="nav-link hide-sm" href="#about">About</a><a class="cart-pill" href="#/cart">🛒 Cart <span class="cart-count" id="cart-count">0</span></a></nav></div></header><main id="page"></main><footer><div class="container footer-inner"><span>© ${new Date().getFullYear()} ${CONFIG.STORE_NAME}. Fresh food, fast order.</span><span>📍 Nebua Naurangia Road (Hardi Chhapra), Kushinagar | We will contact you by phone to confirm your order.</span></div></footer>`}
function render(){document.getElementById("app").innerHTML=shell();updateCartBadge();const r=route();if(r==="cart")renderCart();else if(r==="checkout")renderCheckout();else renderHome()}
function renderHome(){const page=document.getElementById("page");const categories=["All",...new Set(PRODUCTS.map(p=>p.category))];page.innerHTML=`<section class="hero"><div class="container"><div class="hero-content"><div class="badge">🔥 Hot & Fresh Food</div><h1>Desi spice, fresh taste, fast order.</h1><p>Order biryani, burger, chaumin, momo, chicken thali, mutton thali, roasted chicken and more from ${CONFIG.STORE_NAME}.</p><div class="hero-actions"><a href="#menu" class="btn">Order Now</a><a href="#about" class="btn secondary">Why Choose Us</a></div></div></div></section><section class="section container" id="about"><div class="features"><div class="feature"><div class="ico">🍽️</div><h3>Fresh Menu</h3><p>Hot biryani, momo, Chinese, thali and chicken items prepared fresh.</p></div><div class="feature"><div class="ico">🌶️</div><h3>Spicy Taste</h3><p>Restaurant-special masala and chutney for real spicy food lovers.</p></div><div class="feature"><div class="ico">📞</div><h3>Order Confirmed</h3><p>After checkout, order details go directly to restaurant email.</p></div></div></section><section class="section container" id="menu"><div class="section-head"><div><h2>Our Menu</h2><p>Choose your favorite food and place order in seconds.</p></div><span class="stamp">${PRODUCTS.length} food items</span></div><div class="filters" id="filters"></div><div class="grid" id="grid"></div></section>`;const filterWrap=document.getElementById("filters");filterWrap.innerHTML=categories.map(c=>`<button class="chip ${c===activeCategory?'active':''}" data-cat="${c}">${c}</button>`).join("");filterWrap.querySelectorAll(".chip").forEach(btn=>{btn.addEventListener("click",()=>{activeCategory=btn.dataset.cat;renderHome();location.hash="menu"})});const filtered=activeCategory==="All"?PRODUCTS:PRODUCTS.filter(p=>p.category===activeCategory);const grid=document.getElementById("grid");grid.innerHTML=filtered.map(productCard).join("");grid.querySelectorAll("[data-add]").forEach(btn=>{btn.addEventListener("click",()=>{addToCart(btn.dataset.add,1);btn.textContent="Added ✓";btn.classList.add("in-cart")})})}
function productCard(p){return `<article class="card"><div class="card-img"><img src="${p.image}" alt="${p.name}"><span class="cat-label">${p.category}</span></div><div class="card-body"><h3>${p.name}</h3><p class="desc">${p.description}</p><div class="card-footer"><span class="price">${fmt(p.price)}</span><button class="add-btn" data-add="${p.id}">Add +</button></div></div></article>`}
function cartLines(){return getCart().map(item=>{const product=PRODUCTS.find(p=>p.id===item.id);return product?{...item,product,lineTotal:product.price*item.qty}:null}).filter(Boolean)}
function renderCart(){const page=document.getElementById("page");const lines=cartLines();if(lines.length===0){page.innerHTML=`<section class="section container"><div class="empty"><h2 class="page-title">Your cart is empty</h2><p>Add some spicy food first.</p><br><a class="btn" href="#/">Browse Menu</a></div></section>`;return}const subtotal=lines.reduce((sum,l)=>sum+l.lineTotal,0);page.innerHTML=`<section class="section container"><h1 class="page-title">Your Cart</h1><div class="cart-layout"><div id="cart-items"></div><aside class="summary"><h3>Order Summary</h3><div class="summary-row"><span>Items</span><span>${cartCount()}</span></div><div class="summary-row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div><div class="summary-row"><span>Delivery</span><span>Confirm on call</span></div><div class="summary-row grand"><span>Grand Total</span><span>${fmt(subtotal)}</span></div><br><a class="btn full" href="#/checkout">Proceed to Checkout</a></aside></div></section>`;const wrap=document.getElementById("cart-items");wrap.innerHTML=lines.map(l=>`<div class="cart-item"><img src="${l.product.image}" alt="${l.product.name}"><div><div class="item-name">${l.product.name}</div><div class="item-small">${fmt(l.product.price)} each</div><a class="remove" data-remove="${l.id}">Remove</a></div><div class="qty"><button data-minus="${l.id}">−</button><input data-qty="${l.id}" type="number" min="1" max="${l.product.stock}" value="${l.qty}"><button data-plus="${l.id}">+</button></div><div class="total-line">${fmt(l.lineTotal)}</div></div>`).join("");wrap.querySelectorAll("[data-remove]").forEach(el=>el.addEventListener("click",()=>{removeFromCart(el.dataset.remove);renderCart()}));wrap.querySelectorAll("[data-minus]").forEach(el=>el.addEventListener("click",()=>{const item=getCart().find(i=>i.id===el.dataset.minus);if(item){setQty(item.id,item.qty-1);renderCart()}}));wrap.querySelectorAll("[data-plus]").forEach(el=>el.addEventListener("click",()=>{const item=getCart().find(i=>i.id===el.dataset.plus);if(item){setQty(item.id,item.qty+1);renderCart()}}));wrap.querySelectorAll("[data-qty]").forEach(el=>el.addEventListener("change",()=>{setQty(el.dataset.qty,el.value);renderCart()}))}
function renderCheckout(){const page=document.getElementById("page");const lines=cartLines();if(lines.length===0){page.innerHTML=`<section class="section container"><div class="empty"><h2 class="page-title">Nothing to checkout</h2><a class="btn" href="#/">Browse Menu</a></div></section>`;return}const subtotal=lines.reduce((sum,l)=>sum+l.lineTotal,0);page.innerHTML=`<section class="section container"><h1 class="page-title">Checkout</h1><div class="checkout-layout"><div class="form-card"><h3>Customer Details</h3><form id="checkout-form"><div class="field"><label>Full Name</label><input name="name" type="text" required placeholder="Customer name"></div><div class="field"><label>Email</label><input name="email" type="email" required placeholder="customer@gmail.com"></div><div class="field"><label>Phone Number</label><input name="phone" type="tel" required placeholder="10-digit mobile number"></div><div class="field"><label>Delivery Address</label><textarea name="address" required placeholder="House no, street, city, pincode"></textarea></div><div class="field"><label>Notes / Instructions</label><textarea name="notes" placeholder="Extra spicy, less spicy, delivery time, etc."></textarea></div><button class="btn full" id="submit-btn" type="submit">Place Order — ${fmt(subtotal)}</button></form></div><aside class="summary"><h3>Your Food</h3>${lines.map(l=>`<div class="summary-row"><span>${l.product.name} × ${l.qty}</span><span>${fmt(l.lineTotal)}</span></div>`).join("")}<div class="summary-row grand"><span>Total</span><span>${fmt(subtotal)}</span></div></aside></div></section>`;document.getElementById("checkout-form").addEventListener("submit",async(e)=>{e.preventDefault();const form=e.target;const btn=document.getElementById("submit-btn");btn.disabled=true;btn.textContent="Sending order...";const now=new Date();const orderId="SPICY-"+now.getFullYear()+String(now.getMonth()+1).padStart(2,"0")+String(now.getDate()).padStart(2,"0")+"-"+Math.floor(1000+Math.random()*9000);const orderDate=now.toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"});const itemsText=lines.map((l,index)=>`${index+1}. ${l.product.name}\n   Qty: ${l.qty}\n   Price: ${fmt(l.product.price)}\n   Total: ${fmt(l.lineTotal)}`).join("\n\n");const professionalOrderText=`🛒 NEW ORDER RECEIVED\n━━━━━━━━━━━━━━━━━━━━\n\nOrder ID: ${orderId}\nOrder Date: ${orderDate}\nRestaurant: ${CONFIG.STORE_NAME}\n\nCUSTOMER DETAILS\nName: ${form.name.value}\nEmail: ${form.email.value}\nPhone: ${form.phone.value}\n\nDELIVERY ADDRESS\n${form.address.value}\n\nORDER ITEMS\n${itemsText}\n\nPAYMENT SUMMARY\nSubtotal: ${fmt(subtotal)}\nDelivery: To be confirmed\nGrand Total: ${fmt(subtotal)}\n\nCUSTOMER NOTES\n${form.notes.value || "No notes"}\n\n━━━━━━━━━━━━━━━━━━━━\nOrder from: ${CONFIG.STORE_NAME}\nSend notification to: ${CONFIG.RECEIVER_EMAIL}`;const payload={_subject:"New Food Order - "+orderId,order_message:professionalOrderText,order_id:orderId,order_date:orderDate,restaurant_name:CONFIG.STORE_NAME,customer_name:form.name.value,customer_email:form.email.value,customer_phone:form.phone.value,delivery_address:form.address.value,customer_notes:form.notes.value||"No notes",order_items:itemsText,grand_total:fmt(subtotal),cart_json:JSON.stringify(lines.map(l=>({id:l.id,name:l.product.name,qty:l.qty,price:l.product.price,lineTotal:l.lineTotal})))};try{const res=await fetch(CONFIG.FORMSPREE_URL,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(payload)});if(!res.ok)throw new Error("Order request failed");showSuccess(orderId)}catch(err){console.error(err);btn.disabled=false;btn.textContent="Place Order — "+fmt(subtotal);alert("Order send nahi hua. Internet/Formspree setup check karo.")}})}
function showSuccess(orderId){clearCart();const page=document.getElementById("page");page.innerHTML=`<section class="section container"><div class="success"><div class="mark">ORDER PLACED ✓</div><h2 class="page-title">Thank you for ordering!</h2><p>Your order ID is <b>${orderId}</b>. Restaurant will contact you shortly.</p><br><a class="btn" href="#/">Back to Menu</a></div></section>`}
</script>
